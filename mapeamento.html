<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/logo.png">
    <title>Mapeamento | Pulmão Urbano</title>
    <link rel="stylesheet" href="css/style.css?v=1">
    <style>
        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            flex-wrap: wrap;
            padding: 10px 15px;
        }
        .layout-purmao {
            display: flex;
            gap: 50px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            padding: 50px 20px;
        }
        .coluna-dados {
            flex: 1;
            min-width: 350px;
        }
        .coluna-imagem {
            flex: 1;
            text-align: center;
            min-width: 300px;
        }
        .seletor-zonas {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }
        .btn-zona {
            background-color: white;
            color: var(--azul-escuro);
            border: 2px solid var(--azul-escuro);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-zona:hover {
            background-color: #f0f0f0;
        }
        .btn-zona.ativo {
            background-color: #ff3333; 
            color: white;
            border-color: #ff3333;
        }
        .grafico-linha {
            margin-bottom: 20px;
        }
        .grafico-linha strong {
            display: inline-block;
            width: 100px;
            font-size: 14px;
        }
        .barra-bg {
            display: inline-block;
            width: calc(100% - 120px);
            background-color: #e0e0e0;
            height: 15px;
            border-radius: 10px;
            vertical-align: middle;
            overflow: hidden;
        }
        .barra-fill {
            height: 100%;
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #fill-co2 { background-color: #ff0000; } 
        #fill-fumaca { background-color: #ffe600; } 
        #fill-mp10 { background-color: #9c27b0; } 
        #fill-o3 { background-color: #ff4081; }
        .dica-fofinha {
            margin-top: 30px;
            padding: 20px;
            background-color: var(--fundo);
            border-left: 5px solid var(--verde-destaque);
            border-radius: 5px;
            font-style: italic;
            color: var(--texto);
        }
        @media (max-width: 768px) {
            .navbar-container {
                justify-content: center;
                flex-direction: column;
                gap: 10px;
            }
            .nav-links {
                gap: 12px !important;
                font-size: 12px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .layout-purmao {
                flex-direction: column-reverse !important;
                padding: 30px 15px;
                gap: 30px;
            }
            .coluna-dados, .coluna-imagem {
                min-width: 100%;
            }
            .seletor-zonas {
                justify-content: center;
                margin-bottom: 20px;
            }
            .barra-bg {
                width: calc(100% - 90px);
            }
            .grafico-linha strong {
                width: 70px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container navbar-container">
            <div class="logo">
                <a href="/" style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit;">
                    <img src="img/logo.png" alt="Logo ArMonitor" style="height: 40px; width: auto; display: block;">
                    <span style="font-weight: bold; font-size: 18px; letter-spacing: 1px; color: #fff; white-space: nowrap;">Pulmão Urbano</span>
                </a>
            </div>
            <ul class="nav-links" style="display: flex; list-style: none; gap: 20px; margin: 0; padding: 0; align-items: center;">
                <li><a href="/">INÍCIO</a></li>
                <li><a href="pulmao">O PULMÃO</a></li>
                <li><a href="mapeamento" class="active">MAPEAMENTO</a></li>
                <li><a href="saude">SAÚDE</a></li>
                <li><a href="poluentes">POLUENTES</a></li>
            </ul>
        </div>
    </nav>

    <div class="container layout-purmao">
        
        <div class="coluna-dados">
            <h2 style="color: var(--azul-principal); margin-bottom: 15px;">Seletor de Região</h2>
            
            <div class="seletor-zonas" id="botoes-zona">
                <button class="btn-zona ativo" data-id="centro">Centro</button>
                <button class="btn-zona" data-id="leste">Zona Leste</button>
                <button class="btn-zona" data-id="sul">Zona Sul</button>
                <button class="btn-zona" data-id="norte">Zona Norte</button>
                <button class="btn-zona" data-id="oeste">Zona Oeste</button>
            </div>

            <h3 style="color: var(--azul-principal); margin-bottom: 20px;">Níveis de Poluição</h3>

            <div class="grafico-linha">
                <strong>CO²</strong>
                <div class="barra-bg"><div class="barra-fill" id="fill-co2"></div></div>
            </div>
            <div class="grafico-linha">
                <strong>Fumaça</strong>
                <div class="barra-bg"><div class="barra-fill" id="fill-fumaca"></div></div>
            </div>
            <div class="grafico-linha">
                <strong>MP10</strong>
                <div class="barra-bg"><div class="barra-fill" id="fill-mp10"></div></div>
            </div>
            <div class="grafico-linha">
                <strong>Ozônio (O3)</strong>
                <div class="barra-bg"><div class="barra-fill" id="fill-o3"></div></div>
            </div>

            <div class="dica-fofinha">
                <strong>Dica:</strong><br><br>
                <span id="texto-dica">Carregando dica...</span>
            </div>
        </div>

        <div class="coluna-imagem">
            <img src="img/purmao.png" alt="Sistema Respiratório" style="max-width: 100%; height: auto; filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.1));">
        </div>

    </div>

    <script>
        const dadosZonas = {
            centro: { 
                co2: "85%", fumaca: "80%", mp10: "75%", o3: "60%", 
                dica: "Atenção: Tráfego intenso no Centro. A qualidade do ar pode piorar rinite ou asma. Plantas como a Espada-de-São-Jorge ajudam a purificar o ar interno no escritório!" 
            },
            leste: { 
                co2: "75%", fumaca: "70%", mp10: "80%", o3: "65%", 
                dica: "Alta concentração de veículos pesados. Evite exercícios intensos ao ar livre perto de grandes avenidas nos horários de pico." 
            },
            sul: { 
                co2: "50%", fumaca: "40%", mp10: "45%", o3: "55%", 
                dica: "Você sabia? A proximidade com parques e áreas verdes na Zona Sul ajuda a conter a dispersão de poluentes. Respire mais aliviado!" 
            },
            norte: { 
                co2: "55%", fumaca: "45%", mp10: "50%", o3: "60%", 
                dica: "A Serra da Cantareira funciona como um verdadeiro filtro natural para a região. Aproveite os finais de semana nos parques locais!" 
            },
            oeste: { 
                co2: "70%", fumaca: "60%", mp10: "65%", o3: "75%", 
                dica: "Os níveis de Ozônio (O3) podem subir à tarde devido ao sol forte. Mantenha-se hidratado e evite exposição prolongada." 
            }
        };

        const botoes = document.querySelectorAll('.btn-zona');

        function atualizarDados(zonaId) {
            const dados = dadosZonas[zonaId];

            document.getElementById('fill-co2').style.width = dados.co2;
            document.getElementById('fill-fumaca').style.width = dados.fumaca;
            document.getElementById('fill-mp10').style.width = dados.mp10;
            document.getElementById('fill-o3').style.width = dados.o3;

            document.getElementById('texto-dica').innerText = dados.dica;
        }

        botoes.forEach(botao => {
            botao.addEventListener('click', function() {
                botoes.forEach(b => b.classList.remove('ativo'));
                this.classList.add('ativo');

                const zonaSelecionada = this.getAttribute('data-id');
                atualizarDados(zonaSelecionada);
            });
        });

        atualizarDados('centro');
    </script>

    <footer class="footer" style="background-color: var(--azul-escuro); padding: 40px 20px; border-top: 1px solid rgba(255,255,255,0.1);">
        <div class="container" style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
            <div style="display: flex; align-items: center; gap: 10px; color: #fff; font-size: 15px; flex-wrap: wrap; justify-content: center;">
                <span style="opacity: 0.8;">Desenvolvido por</span>
                <a href="https://www.linkedin.com/in/pedro-yoshikado-garcia-a428642b7/" target="_blank" style="display: flex; align-items: center; gap: 8px; background-color: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 20px; color: #fff; text-decoration: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                    </svg>
                    <strong>Pedro Yoshikado Garcia</strong>
                </a>
            </div>
            <p style="font-size: 12px; color: rgba(255,255,255,0.5); margin: 0; text-align: center;">
                &copy; 2026 Pulmão Urbano. Todos os direitos reservados.
            </p>
        </div>
    </footer>
    <script src="js/seguranca.js"></script>
    <script src="js/contador.js"></script>
</body>
</html>
